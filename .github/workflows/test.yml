name: test

permissions:
  contents: read
  
on:
  push:
    branches: [ main ]
    paths:
    - '.github/workflows/test.yml'
    - 'edumfa/**/*.py'
    - 'tests/**'
    - 'tools/**'
    - 'edumfa-manage'
    - 'pyproject.toml'
    - 'setup.py'
  pull_request:
    types: [ opened, reopened, synchronize ]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.14' ]
    name: pytest ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup UV
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group test
      - name: Run Pytest checks
        run: uv run pytest --cov=edumfa --import-mode=importlib -vs -m "not dbcontainer" tests/
      - name: Codecov upload
        uses: codecov/codecov-action@v6
        with:
            token: ${{ secrets.CODECOV_TOKEN }}
            files: ./coverage.xml

  database-full-suite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - database: postgres
            image: postgres:16-alpine
            port: 5432
            test_database_url: postgresql+psycopg://edumfa:edumfa@127.0.0.1:5432/edumfa
            health_cmd: pg_isready -U edumfa -d edumfa
            extra_sync_args: ""
            system_deps: ""
          - database: postgres-psycopg2
            image: postgres:16-alpine
            port: 5432
            test_database_url: postgresql+psycopg2://edumfa:edumfa@127.0.0.1:5432/edumfa
            health_cmd: pg_isready -U edumfa -d edumfa
            extra_sync_args: "--extra postgres"
            system_deps: "libpq-dev"
          - database: mariadb
            image: mariadb:11
            port: 3306
            test_database_url: mysql+pymysql://edumfa:edumfa@127.0.0.1:3306/edumfa
            health_cmd: mariadb-admin ping -h 127.0.0.1 -uedumfa -pedumfa
            extra_sync_args: ""
            system_deps: ""
    name: pytest ${{ matrix.database }}
    services:
      database:
        image: ${{ matrix.image }}
        env:
          POSTGRES_USER: edumfa
          POSTGRES_PASSWORD: edumfa
          POSTGRES_DB: edumfa
          MARIADB_USER: edumfa
          MARIADB_PASSWORD: edumfa
          MARIADB_DATABASE: edumfa
          MARIADB_ROOT_PASSWORD: edumfa
          MYSQL_USER: edumfa
          MYSQL_PASSWORD: edumfa
          MYSQL_DATABASE: edumfa
          MYSQL_ROOT_PASSWORD: edumfa
        ports:
          - ${{ matrix.port }}:${{ matrix.port }}
        options: >-
          --health-cmd "${{ matrix.health_cmd }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Setup UV
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install system dependencies
        if: matrix.system_deps != ''
        run: sudo apt-get install -y ${{ matrix.system_deps }}
      - name: Install dependencies
        run: uv sync --group test ${{ matrix.extra_sync_args }}
      - name: Run Pytest checks against ${{ matrix.database }}
        env:
          TEST_DATABASE_URL: ${{ matrix.test_database_url }}
        run: uv run pytest --import-mode=importlib -vs -m "not dbcontainer" --ignore=tests/test_race_condition.py tests/

  race-condition:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - database: postgres
            image: postgres:16-alpine
            port: 5432
            test_database_url: postgresql+psycopg://edumfa:edumfa@127.0.0.1:5432/edumfa
            health_cmd: pg_isready -U edumfa -d edumfa
            extra_sync_args: ""
            system_deps: ""
          - database: postgres-psycopg2
            image: postgres:16-alpine
            port: 5432
            test_database_url: postgresql+psycopg2://edumfa:edumfa@127.0.0.1:5432/edumfa
            health_cmd: pg_isready -U edumfa -d edumfa
            extra_sync_args: "--extra postgres"
            system_deps: "libpq-dev"
          - database: mariadb
            image: mariadb:11
            port: 3306
            test_database_url: mysql+pymysql://edumfa:edumfa@127.0.0.1:3306/edumfa
            health_cmd: mariadb-admin ping -h 127.0.0.1 -uedumfa -pedumfa
            extra_sync_args: ""
            system_deps: ""
    name: race-condition ${{ matrix.database }}
    services:
      database:
        image: ${{ matrix.image }}
        env:
          POSTGRES_USER: edumfa
          POSTGRES_PASSWORD: edumfa
          POSTGRES_DB: edumfa
          MARIADB_USER: edumfa
          MARIADB_PASSWORD: edumfa
          MARIADB_DATABASE: edumfa
          MARIADB_ROOT_PASSWORD: edumfa
          MYSQL_USER: edumfa
          MYSQL_PASSWORD: edumfa
          MYSQL_DATABASE: edumfa
          MYSQL_ROOT_PASSWORD: edumfa
        ports:
          - ${{ matrix.port }}:${{ matrix.port }}
        options: >-
          --health-cmd "${{ matrix.health_cmd }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Setup UV
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install system dependencies
        if: matrix.system_deps != ''
        run: sudo apt-get install -y ${{ matrix.system_deps }}
      - name: Install dependencies
        run: uv sync --group test ${{ matrix.extra_sync_args }}
      - name: Run race-condition tests against ${{ matrix.database }}
        env:
          TEST_DATABASE_URL: ${{ matrix.test_database_url }}
        run: uv run pytest --import-mode=importlib -vs tests/test_race_condition.py

  database-backend-smoke:
    runs-on: ubuntu-latest
    name: testcontainers database smoke
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Setup UV
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group test
      - name: Run database backend checks
        run: uv run pytest --import-mode=importlib -vs -m dbcontainer tests/test_db_backends.py
